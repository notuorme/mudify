<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mudify.com</title>

    <script defer src="https://unpkg.com/face-api.js/dist/face-api.min.js"></script>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        canvas {
            margin-top: 20px;
            border: 2px solid white;
            max-width: 90%;
        }

        input, button {
            margin-top: 15px;
            padding: 10px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<h1>🟤 Mudify Here</h1>
<h2>Made By NotUOrMe</h2>
<h3>Discord: .lecture</h3>
<h4>Roblox: notuormeee</h4>

<p>Upload an image and we will mudify every face :D</p>

<input type="file" id="upload" accept="image/*">

<br>

<button onclick="mudify()">Mudify Image</button>

<br>

<canvas id="canvas"></canvas>

<script>

window.addEventListener("load", async () => {

    const mudFace = new Image();
    mudFace.src = "mudface.png";

    try {
        await faceapi.nets.tinyFaceDetector.loadFromUri(".");
        console.log("Models loaded!");
    } catch(err){
        console.error(err);
    }

    window.mudify = async function(){

        const file = document.getElementById("upload").files[0];

        if(!file){
            alert("Upload an image first!");
            return;
        }

        const img = new Image();
        img.src = URL.createObjectURL(file);

        img.onload = async ()=>{

            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");

            canvas.width = img.width;
            canvas.height = img.height;

            ctx.drawImage(img,0,0);

            try{

                const detections = await faceapi.detectAllFaces(
                    img,
                    new faceapi.TinyFaceDetectorOptions()
                );

                detections.forEach(face=>{

                    const box = face.box;

                    ctx.drawImage(
                        mudFace,
                        box.x,
                        box.y,
                        box.width,
                        box.height
                    );

                });

            }catch(err){
                console.error(err);
                alert("Face detection failed.");
            }

        };

    };

});

</script>

</body>
</html>
